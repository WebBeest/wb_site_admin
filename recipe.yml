name: "Web-Beest - Site admininistration"
description: "Modules for Drupal site administration" 
type: "Admin"
install:
  - admin_toolbar
  - admin_toolbar_tools
  - config_ignore
  - config_split
  - masquerade
  - rabbit_hole
  - trash
config:
  import:
    admin_toolbar: '*'
    admin_toolbar_tools: '*'
    config_ignore: '*'
    masquerade: '*'
    rabbit_hole: '*'
  strict: false
  actions:
    user.role.administrator:
      createIfNotExists:
        label: 'Administrator'
      grantPermissions:
        - 'administer trash'
        - 'masquerade as any user'
    user.role.editor:
      createIfNotExists:
        label: 'Editor'
      grantPermissions:
        - 'access trash'
        - 'view deleted entities'
